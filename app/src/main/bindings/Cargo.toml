[package]
name = "bindings"
version = "0.1.0"
edition = "2024"

[features]
default = ["dictionary", "mucab", "tesseract", "tts"]
dictionary = ["translator/dictionary"]
mucab = ["translator/mucab"]
tesseract = ["translator/tesseract"]
tts = ["translator/tts"]

[lib]
crate-type = ["cdylib", "rlib"]
name = "bindings"
path = "src/lib.rs"

[dependencies]
translator = { path = "../../../../translator", default-features = false, features = ["uniffi", "transliterate"] }
uniffi = { version = "0.29", features = ["cli"] }
serde_json = "1"
thiserror = "2"

[[bin]]
name = "uniffi-bindgen"
path = "src/bin/uniffi-bindgen.rs"

[profile.release]
lto = "fat"
codegen-units = 1
debug = false
strip = true
