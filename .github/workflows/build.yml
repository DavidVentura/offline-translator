name: Build Android App

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Build Docker image
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        tags: translator-app:latest
        cache-from: type=gha
        cache-to: type=gha,mode=max

  build:
    needs: docker
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [aarch64, armeabi-v7a]
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        submodules: 'recursive'

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Load Docker image from cache
      uses: docker/build-push-action@v5
      with:
        context: .
        file: ./Dockerfile
        push: false
        load: true
        tags: translator-app:latest
        cache-from: type=gha

    - name: Build ${{ matrix.arch }}
      run: |
        docker run --rm \
          -v ${{ github.workspace }}:/home/vagrant/build/dev.davidv.translator/ \
          --user $(id -u):$(id -g) \
          translator-app:latest \
          ./gradlew assemble${{ matrix.arch == 'aarch64' && 'Aarch64' || 'Armeabi-v7a' }}Release

    - name: Upload APK artifacts
      uses: actions/upload-artifact@v4
      with:
        name: apk-${{ matrix.arch }}
        path: app/build/outputs/apk/**/*.apk
        retention-days: 30
